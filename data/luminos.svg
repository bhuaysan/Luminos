<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark film strip background -->
  <rect width="64" height="64" rx="12" fill="#1a1a1a"/>

  <!-- Sprocket holes top -->
  <rect x="5"  y="4" width="8" height="6" rx="2" fill="#2e2e2e"/>
  <rect x="17" y="4" width="8" height="6" rx="2" fill="#2e2e2e"/>
  <rect x="29" y="4" width="8" height="6" rx="2" fill="#2e2e2e"/>
  <rect x="41" y="4" width="8" height="6" rx="2" fill="#2e2e2e"/>

  <!-- Sprocket holes bottom -->
  <rect x="5"  y="54" width="8" height="6" rx="2" fill="#2e2e2e"/>
  <rect x="17" y="54" width="8" height="6" rx="2" fill="#2e2e2e"/>
  <rect x="29" y="54" width="8" height="6" rx="2" fill="#2e2e2e"/>
  <rect x="41" y="54" width="8" height="6" rx="2" fill="#2e2e2e"/>

  <!-- Film frame -->
  <rect x="4" y="13" width="56" height="38" fill="#111111"/>

  <!-- Outer glow ring (orange mask colour) -->
  <circle cx="32" cy="32" r="13" fill="#c47000" opacity="0.35"/>

  <!-- Sun — warm amber representing the positive image -->
  <circle cx="32" cy="32" r="10" fill="#d4820a"/>
  <circle cx="32" cy="32" r="6.5" fill="#f5a623"/>
  <circle cx="32" cy="32" r="3.5" fill="#ffe082"/>

  <!-- Light rays -->
  <line x1="32" y1="14" x2="32" y2="18.5" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="45.5" x2="32" y2="50" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="18.5" y2="32" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45.5" y1="32" x2="50" y2="32" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19.8" y1="19.8" x2="22.9" y2="22.9" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44.2" y1="44.2" x2="41.1" y2="41.1" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44.2" y1="19.8" x2="41.1" y2="22.9" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19.8" y1="44.2" x2="22.9" y2="41.1" stroke="#d4820a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
